{% extends "base.html" %}
{% load static %}

{% block topbar %}{% endblock %}
{% block bottom_nav %}{% endblock %}

{% block content %}
<div class="landing-page">
    <div class="landing-content">

        <h1 class="landing-title">TwoHobby</h1>

        <p class="landing-subtitle">
            Meet people nearby who share your interests
        </p>

        <img
            src="{% static 'images/heart-logo.png' %}"
            alt="TwoHobby heart logo"
            class="landing-heart"
        >

        <div class="landing-actions">
            <a href="{% url 'account_login' %}" class="landing-btn">
                LOGIN
            </a>

            <a href="{% url 'account_signup' %}" class="landing-btn">
                REGISTER
            </a>
        </div>

    </div>
</div>
{% endblock %}
