{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Badoo Clone{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="app-wrapper">

    <!-- 🔝 Top Bar -->
    <header class="top-bar">
        <h1>{% block header %}Nearby{% endblock %}</h1>
        <button class="filter-btn">Filter</button>
    </header>

    <!-- 📄 Main Content -->
    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- 🔻 Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="nav-link">
            <span>📍</span>
            <small>Nearby</small>
        </a>

        <a href="#" class="nav-link">
            <span>💞</span>
            <small>Encounters</small>
        </a>

        <a href="#" class="nav-link">
            <span>❤</span>
            <small>Likes</small>
        </a>

        <a href="#" class="nav-link">
            <span>💬</span>
            <small>Chats</small>
        </a>

        <a href="#" class="nav-link">
            <span>👤</span>
            <small>Profile</small>
        </a>
    </nav>

</div>

</body>
</html>
