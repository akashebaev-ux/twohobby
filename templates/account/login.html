{% extends "base.html" %}

{% block header %}{% endblock %}
{% block filter_button %}{% endblock %}

{% block bottom_nav %}{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">

        <h1>Login</h1>

        <form method="POST" action="{% url 'account_login' %}" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="filter-btn auth-btn">
                Login
            </button>
        </form>

        <p class="auth-link">
            Don't have an account?
            <a href="{% url 'account_signup' %}">Register</a>
        </p>

    </div>
</div>
{% endblock %}
