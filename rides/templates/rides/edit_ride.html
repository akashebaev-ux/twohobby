{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Edit ride</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Save changes
        </button>
    </form>

    <a href="{% url 'rides:ride_detail' ride.pk %}">
        Cancel
    </a>
</div>
{% endblock %}
