{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Edit Ride</h1>

    <form
        method="POST"
        enctype="multipart/form-data"
    >
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Save Changes
        </button>
    </form>

    <a href="{% url 'rides:ride_detail' ride.pk %}">
        Cancel
    </a>
</div>
{% endblock %}
