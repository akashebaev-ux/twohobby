{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}
{% block filter_button %}{% endblock %}
{% block content %}
<div class="profile-detail edit-profile-page">

    <h2 class="edit-profile-title">
        Edit Profile
    </h2>

    <form method="post"
          enctype="multipart/form-data"
          class="auth-form edit-profile-form">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="filter-btn auth-btn">

            Save Profile

        </button>

    </form>

</div>
{% endblock %}
